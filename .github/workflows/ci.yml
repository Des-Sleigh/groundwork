name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api]"
      - name: Lint (ruff)
        run: ruff check . --select E,F,I,W --ignore E501
      - name: Test (pytest + coverage)
        run: pytest -q --cov=core --cov=mcp_server --cov=research_agent --cov=orchestrator --cov=api --cov=evals --cov=benchmark --cov-report=term-missing
      - name: Evals + benchmark (offline, reproducible numbers)
        run: |
          python -m evals.run
          python -m benchmark.run
